services:
  db:
    image: postgres:16-alpine
    container_name: weathermeal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-weathermeal}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-weathermeal}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weathermeal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
